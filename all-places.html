 [46.6567,8.6710],[46.5720,8.4130],[46.5610,8.3410],[46.6863,7.8632],
 [46.7570,8.1580],[47.0517,8.3076],[45.4808,9.2010],

];

var map = L.map('map', { zoomControl:true }).setView([46.8, 11.5], 6);
L.control.scale({ imperial:false }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

}).addTo(map);

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
var colorOf={}, labelOf={}, layers={}, dayBounds={}, dayNames={}, allBounds=[];

/* 여정 경로선: 우선 점선 직선(폴백) → OSRM 실도로 도착 시 실선 교체 */
var fallbackLine = L.polyline(DRIVE, { color:'#6b4a1f', weight:3, opacity:.45, dashArray:'6,9' }).addTo(map);
(function(){
  var url='https://router.project-osrm.org/route/v1/driving/'+DRIVE.map(function(p){return p[1]+','+p[0];}).join(';')+'?overview=full&geometries=geojson';
  var ctrl = ('AbortController' in window)? new AbortController() : null;
  var to = setTimeout(function(){ if(ctrl) ctrl.abort(); }, 7000);
  fetch(url, ctrl?{signal:ctrl.signal}:{}).then(function(r){ return r.json(); }).then(function(j){
    clearTimeout(to);
    if(j && j.routes && j.routes[0]){
      var g = j.routes[0].geometry.coordinates.map(function(c){ return [c[1],c[0]]; });
      map.removeLayer(fallbackLine);
      L.polyline(g, { color:'#5a3a15', weight:4, opacity:.6 }).addTo(map).bringToBack();
      var km = Math.round((j.routes[0].distance||0)/1000);
      var st=document.getElementById('routeStat'); if(st&&km) st.textContent='🛣️ 주행 약 '+km.toLocaleString()+'km';
    }
  }).catch(function(){ clearTimeout(to); var st=document.getElementById('routeStat'); if(st) st.textContent='🛣️ 약 2,600km (직선 표시)'; });
})();

    html:'<div class="mk '+(isBase?'base':'dot')+'" style="background:'+color+'">'+(isBase?badge:num)+'</div>' });
  var g = 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(gname);
  var a = 'https://maps.apple.com/?ll='+lat+','+lng+'&q='+encodeURIComponent(gname);
  var html = '<span class="pt-day" style="background:'+color+'">DAY '+day+(isBase?' · 거점':'')+'</span><br>'
    + '<b>'+esc(name)+'</b><div class="pt-desc">'+esc(desc)+'</div>'
    + '<div class="gmaps"><a class="g" href="'+g+'" target="_blank" rel="noopener">📍 구글맵</a>'
    + '<a class="a" href="'+a+'" target="_blank" rel="noopener"> 애플지도</a></div>';
  placeMarkers[idx] = L.marker([lat,lng], { icon:icon, zIndexOffset:isBase?1000:0 }).addTo(layers[day]).bindPopup(html);
});
map.fitBounds(L.latLngBounds(allBounds), { padding:[42,42] });

/* 전체화면 버튼 */
var FsCtl = L.Control.extend({ options:{position:'topleft'},
  onAdd:function(){
    var b=L.DomUtil.create('div','fsbtn'); b.innerHTML='⛶'; b.title='전체화면';
    L.DomEvent.disableClickPropagation(b);
    b.onclick=function(){
      var el=document.documentElement;
      if(document.fullscreenElement){ document.exitFullscreen(); }
      else if(el.requestFullscreen){ el.requestFullscreen(); }
      setTimeout(function(){ map.invalidateSize(); }, 300);
    };
    return b;
  }
});
map.addControl(new FsCtl());

/* 범례: 색=토글 · 확대=이 날로 줌 · 🧭=구글맵 · 접기 */
var legend = L.control({ position:'topright' });
legend.onAdd = function(){
  var div = L.DomUtil.create('div','legend');
  var rows = DAY_META.map(function(m){
    var gurl = 'https://www.google.com/maps/dir/' + (dayNames[m.d]||[]).map(encodeURIComponent).join('/');
    return '<div class="row" data-day="'+m.d+'">'
      + '<span class="dot" style="background:'+m.color+'"></span>'
      + '<span class="lbl">'+esc(m.label)+'</span>'
      + '<span class="zoom" title="이 날 방문지로 지도 확대">확대</span>'
      + '<a class="gday" href="'+gurl+'" target="_blank" rel="noopener" title="이 날 전체를 구글맵 길찾기">🧭</a>'
      + '</div>';
  }).join('');
  div.innerHTML = '<div class="lhead"><span>일자별</span><span class="tg">접기 ▾</span></div>'
    + '<div class="rows">'+rows+'</div>'
    + '<div class="hint">색 점=표시 켜기/끄기 · <b>확대</b>=그 날로 줌 · 🧭=구글맵 길찾기. 핀→구글맵·애플지도 열기. 🏠 출발/도착 · 🛏 숙소.</div>';
  L.DomEvent.disableClickPropagation(div); L.DomEvent.disableScrollPropagation(div);
  var rowsBox = div.querySelector('.rows'), tg = div.querySelector('.lhead');
  tg.addEventListener('click', function(){
    rowsBox.classList.toggle('collapsed');
    tg.querySelector('.tg').textContent = rowsBox.classList.contains('collapsed') ? '펼치기 ▸' : '접기 ▾';
  });
  div.querySelectorAll('.row').forEach(function(row){
    var d = +row.getAttribute('data-day');
    function toggle(){
      if(map.hasLayer(layers[d])){ map.removeLayer(layers[d]); row.classList.add('off'); }
      else { map.addLayer(layers[d]); row.classList.remove('off'); }
    }
    row.querySelector('.dot').addEventListener('click', toggle);
    row.querySelector('.lbl').addEventListener('click', function(){
      if(dayBounds[d].length) map.fitBounds(L.latLngBounds(dayBounds[d]), { padding:[60,60], maxZoom:13 });
    });
    row.querySelector('.zoom').addEventListener('click', function(e){
      e.stopPropagation();
      if(dayBounds[d].length) map.fitBounds(L.latLngBounds(dayBounds[d]), { padding:[60,60], maxZoom:13 });
    });
  });
  return div;
};
legend.addTo(map);

/* ── 방문지 리스트 패널 ── */
(function(){
  var body=document.getElementById('listBody');
  var panel=document.getElementById('listPanel');
  var html='';
  DAY_META.forEach(function(m){
    var items=PLACES.map(function(p,i){ return [p,i]; }).filter(function(x){ return x[0][0]===m.d; });
    if(!items.length) return;
    html+='<div class="lp-day" data-zoomday="'+m.d+'"><span class="cdot" style="background:'+m.color+'"></span>'+esc(m.label)+'<span class="cnt">'+items.length+'곳</span></div>';
    items.forEach(function(x){
      var p=x[0], i=x[1], name=p[1], desc=p[2], lat=p[3], lng=p[4], gname=p[5], badge=p[6], num=p[7];
      var g='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(gname);
      var a='https://maps.apple.com/?ll='+lat+','+lng+'&q='+encodeURIComponent(gname);
      html+='<div class="lp-item" data-idx="'+i+'">'
        +'<span class="lp-num" style="background:'+m.color+'">'+(badge?badge:num)+'</span>'
        +'<span class="lp-txt"><span class="lp-name">'+esc(name)+'</span>'
        +'<span class="lp-desc">'+esc(desc)+'</span>'
        +'<span class="lp-links"><a class="g" href="'+g+'" target="_blank" rel="noopener">📍 구글맵</a>'
        +'<a class="a" href="'+a+'" target="_blank" rel="noopener">애플지도</a></span></span></div>';
    });
  });
  body.innerHTML=html;
  /* 동적 개수 반영 */
  var pc=document.getElementById('placeCount'); if(pc) pc.textContent='📍 '+PLACES.length+'곳';
  var lpc=document.getElementById('lpCount'); if(lpc) lpc.textContent=PLACES.length+'곳 · '+DAY_META.length+'일';

  function openList(){ panel.classList.add('open'); }
  function closeList(){ panel.classList.remove('open'); }
  document.getElementById('listToggle').addEventListener('click', function(){ panel.classList.toggle('open'); });
  document.getElementById('listClose').addEventListener('click', closeList);

  /* 항목 클릭 → 해당 지점으로 이동 + 팝업 열기 */
  body.addEventListener('click', function(e){
    if(e.target.closest('.lp-links')) return; /* 링크는 그대로 */
    var day=e.target.closest('.lp-day');
    if(day){ var d=+day.getAttribute('data-zoomday'); if(dayBounds[d]&&dayBounds[d].length){ if(!map.hasLayer(layers[d])) map.addLayer(layers[d]); map.fitBounds(L.latLngBounds(dayBounds[d]),{padding:[60,60],maxZoom:13}); if(window.innerWidth<=560) closeList(); } return; }
    var it=e.target.closest('.lp-item'); if(!it) return;
    var idx=+it.getAttribute('data-idx'), mk=placeMarkers[idx]; if(!mk) return;
    var pd=PLACES[idx][0];
    if(!map.hasLayer(layers[pd])) map.addLayer(layers[pd]);
    map.flyTo(mk.getLatLng(), Math.max(map.getZoom(),13), { duration:.6 });
    mk.openPopup();
    if(window.innerWidth<=560) closeList();
  });

  /* KML: 페이지 이동 없이 파일만 저장(되돌아올 수 없는 문제 방지) */
  var kbtn=document.getElementById('kmlBtn');
  if(kbtn && 'fetch' in window){
    kbtn.addEventListener('click', function(e){
      e.preventDefault();
      fetch(kbtn.href).then(function(r){ if(!r.ok) throw 0; return r.blob(); }).then(function(b){
        var u=URL.createObjectURL(b), a=document.createElement('a');
        a.href=u; a.download='europe-trip-map.kml'; document.body.appendChild(a); a.click();
        setTimeout(function(){ URL.revokeObjectURL(u); a.remove(); }, 1500);
      }).catch(function(){ window.open(kbtn.href,'_blank','noopener'); });
    });
  }
})();
</script>
</body>
</html>
