<div id="app" class="flex flex-col md:flex-row h-auto md:h-screen md:overflow-hidden">

const map = L.map('map',{zoomControl:true}).setView([46.8,11.5],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'© OpenStreetMap'
}).addTo(map);

const latlngs = ROUTE.stops.map(s=>[s.lat,s.lng]);
/* 전체 노선 맞춤: 모바일에서는 상단 제목이 노선을 가리지 않도록 위쪽 여백을 크게 준다 */
function fitAll(){
  const mobile = window.matchMedia('(max-width:767px)').matches;
  map.fitBounds(L.latLngBounds(latlngs), {
    paddingTopLeft: mobile ? [20, 120] : [40, 40],
    paddingBottomRight: [20, 20]
  });
}
fitAll();

/* 실제 도로 경로: OSRM 공개 라우팅으로 구간별 도로 형상을 받아 그린다.
   실패 시 직선(점선)으로 폴백한다. */
function stop(id){return ROUTE.stops.find(s=>s.id===id);}
async function drawRoads(){
  for(const lg of ROUTE.legs){
    const a=stop(lg.from), b=stop(lg.to);
    let drawn=false;
    try{
      const url=`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
      const r=await fetch(url); const j=await r.json();
      if(j.routes && j.routes[0]){
        const coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
        L.polyline(coords,{color:'#c0392b',weight:4,opacity:.85}).addTo(map);
        drawn=true;
      }
    }catch(e){}
    if(!drawn){
      L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{color:'#c0392b',weight:3,opacity:.5,dashArray:'6,7'}).addTo(map);
    }
  }
}
drawRoads();

const markers = {};
let stayNo = 0;
ROUTE.stops.forEach(s=>{
  const isStay = s.type==='stay';
  if(isStay) stayNo++;
  const label = isStay? String(stayNo) : '';
  const size = isStay?28:14;
  const icon = L.divIcon({ className:'',
    html:`<div class="${isStay?'mk-num':'mk-wp'}"
      style="width:${size}px;height:${size}px;line-height:${size-4}px;font-size:13px">${label}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2] });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup(`<b>${s.name}</b><br><small>${s.country} · ${fmtDay(s.day)}</small>`,{autoPan:false});
  m.on('click',()=>selectStop(s.id));
  markers[s.id]=m;
});

/* ===== 선택 동작 ===== */
function selectStop(id){
  const s = ROUTE.stops.find(x=>x.id===id);
  const p = POI[id] || {};
  // 지도는 전체 보기를 그대로 유지하고, 말풍선만 열어 색상으로 강조
  markers[id].openPopup();
  const popEl = markers[id].getPopup().getElement();
  if(popEl){
    document.querySelectorAll('.leaflet-popup.popup-active').forEach(p=>p.classList.remove('popup-active'));
    popEl.classList.add('popup-active');
  }

  document.getElementById('p-chip').textContent =
    (s.type==='start'?'출발':s.type==='end'?'도착':s.type==='waypoint'?'경유·관광':`숙박 ${s.nights}박`) + ' · ' + fmtDay(s.day);
  document.getElementById('p-name').textContent = s.name;
  document.getElementById('p-sub').textContent = s.country;

  const city = s.name.replace(/\s*\(.*\)/,'').replace(/\s*\(.*$/,'');
  let html='';

  // 이전 도시 → 현재 도시 운전 정보 (해당 구간이 있는 도시에만 표시)
  const leg = legTo(id);
  if(leg){
    const from = stop(leg.from);
    const fuelL = leg.km * (ROUTE.fuel.consumption/100);
    const fuelCost = fuelL * ROUTE.fuel.priceEur;
    html += `<div class="mt-4 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
      <div class="text-[12px] text-slate-500 mb-2">🚗 <b class="text-slate-700">${from.name.replace(/\s*\(.*\)/,'')}</b> → <b class="text-slate-700">${city}</b> 운전 구간</div>
      <div class="grid grid-cols-2 gap-2 text-[13px]">
        <div class="bg-white rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">소요 시간</div><div class="font-bold">${fmtHours(leg.hours)}</div></div>
        <div class="bg-white rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">거리</div><div class="font-bold">${leg.km} km</div></div>
        <div class="bg-white rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">예상 휘발유</div><div class="font-bold">${fuelL.toFixed(0)} L <span class="text-slate-400 font-normal">≈ €${fuelCost.toFixed(0)}</span></div></div>
        <div class="bg-white rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">예상 톨비</div><div class="font-bold">€${leg.toll}</div></div>
      </div>
      ${leg.tollNote?`<div class="text-[11px] text-slate-400 mt-2">ℹ ${leg.tollNote}</div>`:''}
      <div class="text-[10.5px] text-slate-400 mt-1">* ${ROUTE.fuel.note} · 톨/연료는 추정치</div>
    </div>`;
  }

  if(p.hotels && p.hotels.length){
    const cards = p.hotels.map(h=>card(h.name,h.price,h.note,[h.parking?`🅿 ${h.parking}`:''], gmaps(h.name, city, s.country)));
    html += sec('🏨 추천 숙소', p.hotels.length, expandable(cards, id+'-h'));
  }
  if(p.restaurants && p.restaurants.length){
    const cards = p.restaurants.map(r=>card(r.name,r.price,r.note,[r.cuisine?r.cuisine:''], gmaps(r.name, city, s.country)));
    html += sec('🍽 추천 식당', p.restaurants.length, expandable(cards, id+'-r'));
  }
  if(p.highlights && p.highlights.length){
    html += `<div class="mt-5"><h3 class="text-[13px] uppercase tracking-wider text-accent2 font-semibold mb-2.5">📍 가볼 만한 곳</h3>
      <div class="flex flex-wrap gap-1.5">${
      p.highlights.map(h=>`<a href="${gmaps(h, city, s.country)}" target="_blank" rel="noopener"
        class="bg-slate-100 hover:bg-sky-100 hover:text-accent2 rounded-lg px-2.5 py-1.5 text-[12.5px] transition">${h}</a>`).join('')}</div></div>`;
  }
  document.getElementById('p-body').innerHTML = html ||
    '<div class="mt-5 text-slate-500 text-[13px]">이 지점은 이동 경유지입니다.</div>';

  document.querySelectorAll('.dl-item').forEach(e=>{
    const on = e.dataset.id===id;
    e.classList.toggle('bg-red-50', on);
    e.classList.toggle('shadow-[inset_3px_0_0_#c0392b]', on);
  });
}
function sec(t,cnt,inner){
  return `<div class="mt-5"><h3 class="text-[13px] uppercase tracking-wider text-accent2 font-semibold mb-2.5 flex items-center gap-2">${t}<span class="text-slate-400 font-normal text-[11.5px]">${cnt}곳</span></h3>${inner}</div>`;
}
const SHOWN = 2; // 기본 노출 개수, 나머지는 '더보기'로 펼침
function expandable(cards, key){
  if(cards.length <= SHOWN) return cards.join('');
  const head = cards.slice(0, SHOWN).join('');
  const rest = cards.slice(SHOWN).join('');
  const n = cards.length - SHOWN;
  return `${head}<div id="more-${key}" class="hidden">${rest}</div>
    <button type="button" onclick="toggleMore('${key}',this)"
      class="w-full mt-1 mb-1 text-[12.5px] font-semibold text-accent2 border border-slate-200 rounded-lg py-2 hover:bg-slate-50 transition">
      더보기 <span class="text-slate-400">+${n}곳</span></button>`;
}
function toggleMore(key, btn){
  const el = document.getElementById('more-'+key);
  const hidden = el.classList.toggle('hidden');
  btn.innerHTML = hidden
    ? `더보기 <span class="text-slate-400">+${el.children.length}곳</span>`
    : '접기 ▲';
}
function gmaps(name,city,country){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(`${name} ${city} ${country}`);
}
function card(nm,price,note,tags,mapUrl){
  const nameHtml = mapUrl
    ? `<a href="${mapUrl}" target="_blank" rel="noopener" title="구글 지도에서 보기"
        class="font-bold text-[14.5px] text-accent2 hover:underline decoration-dotted underline-offset-2">${nm} <span class="text-[11px] align-middle opacity-70">📍</span></a>`
    : `<span class="font-bold text-[14.5px]">${nm}</span>`;
  return `<div class="border border-slate-200 rounded-xl px-3.5 py-3 mb-2.5 hover:border-slate-300 hover:shadow-md transition">
    <div class="flex justify-between items-baseline gap-2">
      ${nameHtml}${
      price?`<span class="text-xs font-bold text-amber-600 whitespace-nowrap">${price}</span>`:''}</div>${
    note?`<div class="text-slate-500 text-[12.8px] mt-1 leading-relaxed">${note}</div>`:''}
    <div class="mt-1.5">${
    (tags||[]).filter(Boolean).map(t=>`<span class="inline-block bg-slate-100 text-slate-600 text-[11px] px-2 py-0.5 rounded mr-1.5">${t}</span>`).join('')}</div></div>`;
}
/* '여정 선택' 버튼: 전체 노선이 보이도록 지도 맞춤 + 선택 강조 해제 */
function showFullRoute(){
  map.closePopup();
  document.querySelectorAll('.leaflet-popup.popup-active').forEach(p=>p.classList.remove('popup-active'));
  document.querySelectorAll('.dl-item').forEach(e=>{
    e.classList.remove('bg-red-50');
    e.classList.remove('shadow-[inset_3px_0_0_#c0392b]');
  });
  fitAll();
}
function fmtDay(d){const dd=d.split('-')[2];const mm=+d.split('-')[1];return `${mm}/${+dd}`}
function fmtHours(h){const H=Math.floor(h);const M=Math.round((h-H)*60);return M?`${H}시간 ${M}분`:`${H}시간`;}
function legTo(id){return ROUTE.legs.find(l=>l.to===id)}
function sumKm(){return ROUTE.legs.reduce((a,l)=>a+l.km,0)}

selectStop(ROUTE.stops[0].id);
</script>
