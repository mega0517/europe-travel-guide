<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>중부유럽 자가용 일주 7박 8일 · 여행 가이드</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --bg:#0f1720; --panel:#fff; --ink:#1c2733; --muted:#6b7785;
    --accent:#c0392b; --accent2:#2c6e8f; --line:#e6e9ec; --chip:#f2f5f7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Helvetica Neue',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--ink);background:var(--bg)}
  #app{display:flex;height:100vh;overflow:hidden}

  /* 좌: 지도 */
  #map-wrap{flex:1 1 48%;position:relative;min-width:0}
  #map{position:absolute;inset:0}
  .map-header{position:absolute;z-index:1000;top:14px;left:14px;right:14px;
    background:rgba(15,23,32,.82);backdrop-filter:blur(6px);color:#fff;
    padding:12px 16px;border-radius:12px;pointer-events:none}
  .map-header h1{font-size:18px;letter-spacing:-.3px}
  .map-header p{font-size:12.5px;opacity:.82;margin-top:3px}
  .map-header .meta{font-size:11.5px;opacity:.7;margin-top:6px}

  /* 중: 여정 선택 열 */
  #daycol{flex:0 0 250px;background:#fafbfc;border-left:1px solid var(--line);
    overflow-y:auto;display:flex;flex-direction:column}
  .col-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.5px;padding:16px 16px 10px;position:sticky;top:0;background:#fafbfc;z-index:5;border-bottom:1px solid var(--line)}
  .daylist{padding:8px 10px}
  .dl-item{display:flex;align-items:center;gap:10px;padding:9px 9px;border-radius:9px;cursor:pointer;margin-bottom:2px}
  .dl-item:hover{background:#eef2f5}
  .dl-item.active{background:#fbe9e7;box-shadow:inset 3px 0 0 var(--accent)}
  .dl-num{width:25px;height:25px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .dl-num.wp{background:#9aa7b1;width:19px;height:19px;font-size:0}
  .dl-txt{font-size:13px;min-width:0}
  .dl-txt b{display:block;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dl-txt small{color:var(--muted);font-size:11.5px}
  .tips{margin:10px;background:#fff8e1;border:1px solid #ffe082;border-radius:11px;padding:13px 14px}
  .tips h3{color:#b7791f;font-size:12.5px;margin-bottom:8px}
  .tips li{font-size:11.8px;line-height:1.55;margin-left:15px;margin-bottom:6px;color:#5d4d22}

  /* 우: 추천 숙소/식당 열 */
  #panel{flex:0 0 34%;max-width:460px;background:var(--panel);overflow-y:auto;
    box-shadow:-6px 0 24px rgba(0,0,0,.25);display:flex;flex-direction:column}
  .p-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5}
  .p-head .day-chip{display:inline-block;background:var(--accent);color:#fff;font-size:11.5px;
    font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px}
  .p-head h2{font-size:21px;letter-spacing:-.4px}
  .p-head .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .p-body{padding:6px 20px 30px}
  .section{margin-top:20px}
  .section h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);
    margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .section h3 .cnt{color:var(--muted);font-weight:500;font-size:11.5px}
  .card{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;transition:.15s}
  .card:hover{border-color:#c9d3da;box-shadow:0 3px 12px rgba(0,0,0,.05)}
  .card .row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .card .nm{font-weight:700;font-size:14.5px}
  .card .price{font-size:12px;color:#b8860b;font-weight:700;white-space:nowrap}
  .card .nt{color:var(--muted);font-size:12.8px;margin-top:4px;line-height:1.5}
  .card .tag{display:inline-block;background:var(--chip);color:#54616e;font-size:11px;
    padding:2px 8px;border-radius:6px;margin-top:7px;margin-right:5px}
  .hl{display:flex;flex-wrap:wrap;gap:7px}
  .hl span{background:var(--chip);border-radius:8px;padding:6px 11px;font-size:12.5px}
  .leaflet-marker-num{background:var(--accent);color:#fff;border-radius:50%;text-align:center;
    font-weight:700;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)}
  .leaflet-marker-wp{background:#fff;border:2px solid #9aa7b1;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)}

  @media(max-width:980px){
    #app{flex-direction:column;height:auto}
    #map-wrap{flex:none;height:46vh;position:relative}
    #daycol{flex:none;max-height:none}
    #panel{flex:none;max-width:none}
  }
</style>
</head>
<body>
<div id="app">

  <div id="map-wrap">

  <div id="daycol">

    <div class="tips" id="tips"></div>
  </div>

  <!-- 우: 추천 숙소/식당 열 -->
  <aside id="panel">
    <div class="p-head">
      <span class="day-chip" id="p-chip"></span>
      <h2 id="p-name"></h2>
      <div class="sub" id="p-sub"></div>
    </div>
    <div class="p-body" id="p-body"></div>
  </aside>
</div>

/* ===== 지도 ===== */
const map = L.map('map',{zoomControl:true}).setView([46.8,11.5],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'© OpenStreetMap'
}).addTo(map);

const latlngs = ROUTE.stops.map(s=>[s.lat,s.lng]);
L.polyline(latlngs,{color:'#c0392b',weight:3,opacity:.75}).addTo(map);
map.fitBounds(L.latLngBounds(latlngs).pad(0.12));

const markers = {};
let stayNo = 0;
ROUTE.stops.forEach(s=>{
  const isStay = s.type==='stay';
  if(isStay) stayNo++;
  const label = isStay? String(stayNo) : '';
  const size = isStay?28:14;
  const icon = L.divIcon({ className:'',
    html:`<div class="${isStay?'leaflet-marker-num':'leaflet-marker-wp'}"
      style="width:${size}px;height:${size}px;line-height:${size-4}px;font-size:13px">${label}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2] });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup(`<b>${s.name}</b><br><small>${s.country} · ${fmtDay(s.day)}</small>`);
  m.on('click',()=>selectStop(s.id));
  markers[s.id]=m;
});

/* 헤더 */
document.getElementById('t-title').textContent = ROUTE.trip.title;
document.getElementById('t-sub').textContent = ROUTE.trip.subtitle;
document.getElementById('t-meta').textContent =
  `🚗 ${ROUTE.trip.car} · 📅 ${ROUTE.trip.start} ~ ${ROUTE.trip.end} · 총 ${sumKm()}km`;

/* 중간 열: 여정 리스트 */
const dl = document.getElementById('daylist');
let nStay=0;
ROUTE.stops.forEach(s=>{
  if(s.type==='stay') nStay++;
  const num = s.type==='stay'? nStay : '';
  const leg = legTo(s.id);
  const el = document.createElement('div');
  el.className='dl-item'; el.dataset.id=s.id;
  el.innerHTML = `<div class="dl-num ${s.type!=='stay'?'wp':''}">${num}</div>
    <div class="dl-txt"><b>${s.name}</b>
    <small>${fmtDay(s.day)} · ${s.country}${s.nights?` · ${s.nights}박`:''}${leg?` · ${leg.km}km`:''}</small></div>`;
  el.onclick=()=>selectStop(s.id);
  dl.appendChild(el);
});

document.getElementById('tips').innerHTML =
  `<h3>🚘 자가용 여행 팁</h3><ul>${ROUTE.tips.map(t=>`<li>${t}</li>`).join('')}</ul>`;

/* ===== 선택 동작 ===== */
function selectStop(id){
  const s = ROUTE.stops.find(x=>x.id===id);
  const p = POI[id] || {};
  map.flyTo([s.lat,s.lng], s.type==='stay'?12:11, {duration:.8});
  markers[id].openPopup();

  document.getElementById('p-chip').textContent =
    (s.type==='start'?'출발':s.type==='end'?'도착':s.type==='waypoint'?'경유·관광':`숙박 ${s.nights}박`) + ' · ' + fmtDay(s.day);
  document.getElementById('p-name').textContent = s.name;
  document.getElementById('p-sub').textContent = s.country;

  let html='';
  if(p.hotels && p.hotels.length){
    html += sec('🏨 추천 숙소', p.hotels.length, p.hotels.map(h=>card(h.name,h.price,h.note,
      [h.parking?`🅿 ${h.parking}`:''])).join(''));
  }
  if(p.restaurants && p.restaurants.length){
    html += sec('🍽 추천 식당', p.restaurants.length, p.restaurants.map(r=>card(r.name,r.price,r.note,
      [r.cuisine?r.cuisine:''])).join(''));
  }
  if(p.highlights && p.highlights.length){
    html += `<div class="section"><h3>📍 가볼 만한 곳</h3><div class="hl">${
      p.highlights.map(h=>`<span>${h}</span>`).join('')}</div></div>`;
  }
  document.getElementById('p-body').innerHTML = html ||
    '<div class="section" style="color:#6b7785;font-size:13px">이 지점은 이동 경유지입니다.</div>';

  document.querySelectorAll('.dl-item').forEach(e=>e.classList.toggle('active',e.dataset.id===id));
}
function sec(t,cnt,inner){return `<div class="section"><h3>${t}<span class="cnt">${cnt}곳</span></h3>${inner}</div>`}
function card(nm,price,note,tags){
  return `<div class="card"><div class="row"><span class="nm">${nm}</span>${
    price?`<span class="price">${price}</span>`:''}</div>${
    note?`<div class="nt">${note}</div>`:''}${
    (tags||[]).filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
}
function fmtDay(d){const dd=d.split('-')[2];const mm=+d.split('-')[1];return `${mm}/${+dd}`}
function legTo(id){return ROUTE.legs.find(l=>l.to===id)}
function sumKm(){return ROUTE.legs.reduce((a,l)=>a+l.km,0)}

selectStop(ROUTE.stops[0].id);
</script>
