<body class="min-h-screen md:h-screen md:overflow-hidden font-sans text-slate-800">
<div id="app" class="flex flex-col md:flex-row h-auto md:h-screen md:overflow-hidden">

    </div>
  </div>

        🗺 여정 선택 <span class="font-normal opacity-80 text-[11.5px]">· 전체 노선 보기</span>

    </div>
    <div id="daylist" class="px-2.5 py-2"></div>
  </div>

    <div class="px-5 pt-[18px] pb-3.5 border-b border-slate-200 sticky top-0 bg-white z-[5]">

</div>

/* 실제 도로 경로: OSRM 공개 라우팅으로 구간별 도로 형상을 받아 그린다.
   실패 시 직선(점선)으로 폴백한다. */
function stop(id){return ROUTE.stops.find(s=>s.id===id);}
async function drawRoads(){
  for(const lg of ROUTE.legs){
    const a=stop(lg.from), b=stop(lg.to);
    let drawn=false;
    try{
      const url=`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
      const r=await fetch(url); const j=await r.json();
      if(j.routes && j.routes[0]){
        const coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
        L.polyline(coords,{color:'#c0392b',weight:4,opacity:.85}).addTo(map);
        drawn=true;
      }
    }catch(e){}
    if(!drawn){
      L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{color:'#c0392b',weight:3,opacity:.5,dashArray:'6,7'}).addTo(map);
    }
  }
}
drawRoads();

function selectStop(id){
  const s = ROUTE.stops.find(x=>x.id===id);
  const p = POI[id] || {};
  // 지도는 전체 보기를 그대로 유지하고, 말풍선만 열어 색상으로 강조
  markers[id].openPopup();
  const popEl = markers[id].getPopup().getElement();
  if(popEl){
    document.querySelectorAll('.leaflet-popup.popup-active').forEach(p=>p.classList.remove('popup-active'));
    popEl.classList.add('popup-active');
  }

  document.getElementById('p-chip').textContent =
    (s.type==='start'?'출발':s.type==='end'?'도착':s.type==='waypoint'?'경유·관광':`숙박 ${s.nights}박`) + ' · ' + fmtDay(s.day);
  document.getElementById('p-name').textContent = s.name;
  document.getElementById('p-sub').textContent = s.country;

  const city = s.name.replace(/\s*\(.*\)/,'').replace(/\s*\(.*$/,'');
  let html='';

  // 운전 정보 + 자가용 여행 팁 (접이식 카드). 운전 구간이 없는 도시는 팁만 표시
  const leg = legTo(id);
  const tips = CITY_TIPS[id] || [];
  if(leg || tips.length){
    let body='';
    if(leg){
      const from = stop(leg.from);
      const fuelL = leg.km * (ROUTE.fuel.consumption/100);
      const fuelCost = fuelL * ROUTE.fuel.priceEur;
      body += `<div class="grid grid-cols-2 gap-2 text-[13px]">
          <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">소요 시간</div><div class="font-bold">${fmtHours(leg.hours)}</div></div>
          <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">거리</div><div class="font-bold">${leg.km} km</div></div>
          <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">예상 휘발유</div><div class="font-bold">${fuelL.toFixed(0)} L <span class="text-slate-400 font-normal">≈ €${fuelCost.toFixed(0)}</span></div></div>
          <div class="bg-slate-50 rounded-lg px-3 py-2"><div class="text-[10.5px] text-slate-400">예상 톨비</div><div class="font-bold">€${leg.toll}</div></div>
        </div>
        ${leg.tollNote?`<div class="text-[11px] text-slate-400 mt-2">ℹ ${leg.tollNote}</div>`:''}
        <div class="text-[10.5px] text-slate-400 mt-1">* ${ROUTE.fuel.note} · 톨/연료는 추정치</div>`;
    }
    if(tips.length){
      body += `<div class="${leg?'mt-3 pt-3 border-t border-slate-200':''}">
        <div class="text-[11.5px] font-bold text-amber-700 mb-1.5">🚘 ${city} 자가용 여행 팁</div>
        <ul class="list-disc ml-4">${tips.map(t=>`<li class="text-[11.5px] leading-snug mb-1 text-amber-900/80">${t}</li>`).join('')}</ul></div>`;
    }
    const from = leg ? stop(leg.from).name.replace(/\s*\(.*\)/,'') : '';
    const header = leg ? `🚗 ${from} → ${city} · 운전 정보 & 팁` : `🚘 ${city} 자가용 여행 팁`;
    html += `<div class="mt-4 rounded-xl border border-slate-200 overflow-hidden">
      <button type="button" onclick="toggleDrive(this)"
        class="w-full flex items-center justify-between gap-2 bg-slate-50 hover:bg-slate-100 px-4 py-3 text-left transition">
        <span class="text-[12.5px] font-semibold text-slate-700">${header}</span>
        <span class="drive-chev text-slate-400 text-[11px]">▼ 펼치기</span>
      </button>
      <div class="drive-body hidden px-4 py-3 border-t border-slate-200">${body}</div>
    </div>`;
  }

  if(p.hotels && p.hotels.length){
    const cards = p.hotels.map(h=>card(h.name,h.price,h.note,[h.parking?`🅿 ${h.parking}`:''], gmaps(h.name, city, s.country), 'hotel'));
    html += sec('🏨 추천 숙소 (호텔)', p.hotels.length, expandable(cards, id+'-h'), 'text-sky-700');
  }
  if(p.airbnb && p.airbnb.length){
    const ci = s.day, co = addDays(s.day, s.nights||1);

    const cards = p.airbnb.map(a=>card(a.name,a.price,a.note,['👥 4인', a.area].filter(Boolean), aurl, 'airbnb'));
    html += sec(`🏠 에어비앤비 · 4인 (${fmtDay(ci)}~${fmtDay(co)})`, p.airbnb.length,
      expandable(cards, id+'-a')
      + `<a href="${aurl}" target="_blank" rel="noopener" class="block text-center text-[11.5px] font-semibold text-rose-600 border border-rose-200 bg-rose-50 rounded-lg py-1.5 mt-1 hover:bg-rose-100 transition">에어비앤비에서 4인 숙소 더 찾기 →</a>`,
      'text-rose-700');
  }
  if(p.restaurants && p.restaurants.length){
    const cards = p.restaurants.map(r=>card(r.name,r.price,r.note,[r.cuisine?r.cuisine:''], gmaps(r.name, city, s.country), 'food'));
    html += sec('🍽 추천 식당', p.restaurants.length, expandable(cards, id+'-r'), 'text-amber-700');

  if(p.highlights && p.highlights.length){
    html += `<div class="mt-4"><h3 class="text-[12.5px] uppercase tracking-wide text-emerald-700 font-bold mb-2">📍 가볼 만한 곳 <span class="text-slate-400 font-normal text-[11px]">${p.highlights.length}곳</span></h3>
      <div class="flex flex-wrap gap-1.5">${
      p.highlights.map(h=>`<a href="${gmaps(h, city, s.country)}" target="_blank" rel="noopener"
        class="bg-emerald-50 text-emerald-800 border border-emerald-100 hover:bg-emerald-100 rounded-md px-2.5 py-1 text-[12px] transition">${h}</a>`).join('')}</div></div>`;
  }
  document.getElementById('p-body').innerHTML = html ||
    '<div class="mt-5 text-slate-500 text-[13px]">이 지점은 이동 경유지입니다.</div>';

  document.querySelectorAll('.dl-item').forEach(e=>{
    const on = e.dataset.id===id;
    e.classList.toggle('bg-red-50', on);
    e.classList.toggle('shadow-[inset_3px_0_0_#c0392b]', on);
  });
}
function sec(t,cnt,inner,hc){
  return `<div class="mt-4"><h3 class="text-[12.5px] uppercase tracking-wide ${hc||'text-accent2'} font-bold mb-2 flex items-center gap-2">${t}<span class="text-slate-400 font-normal text-[11px]">${cnt}곳</span></h3>${inner}</div>`;
}
/* 카드 유형별 색상(좌측 보더+호버) */
const CARD_THEME = {
  hotel:  'border-l-sky-400 bg-sky-50/40 hover:bg-sky-50',
  food:   'border-l-amber-400 bg-amber-50/40 hover:bg-amber-50',
  airbnb: 'border-l-rose-400 bg-rose-50/40 hover:bg-rose-50'
};
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function airbnbUrl(city,country,checkin,checkout){
  let u='https://www.airbnb.com/s/'+encodeURIComponent(`${city} ${country}`)+'/homes?adults=4';
  if(checkin&&checkout) u+=`&checkin=${checkin}&checkout=${checkout}`;
  return u;
}
function priceColor(p){
  if(p==='€') return 'text-emerald-600';
  if(p==='€€') return 'text-amber-600';
  if(p==='€€€') return 'text-rose-600';
  return 'text-slate-500';
}
const SHOWN = 2; // 기본 노출 개수, 나머지는 '더보기'로 펼침
function expandable(cards, key){
  if(cards.length <= SHOWN) return cards.join('');
  const head = cards.slice(0, SHOWN).join('');
  const rest = cards.slice(SHOWN).join('');
  const n = cards.length - SHOWN;
  return `${head}<div id="more-${key}" class="hidden">${rest}</div>
    <button type="button" onclick="toggleMore('${key}',this)"
      class="w-full mt-1 mb-1 text-[12.5px] font-semibold text-accent2 border border-slate-200 rounded-lg py-2 hover:bg-slate-50 transition">
      더보기 <span class="text-slate-400">+${n}곳</span></button>`;
}
function toggleMore(key, btn){
  const el = document.getElementById('more-'+key);
  const hidden = el.classList.toggle('hidden');
  btn.innerHTML = hidden
    ? `더보기 <span class="text-slate-400">+${el.children.length}곳</span>`
    : '접기 ▲';
}
function gmaps(name,city,country){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(`${name} ${city} ${country}`);
}
function card(nm,price,note,tags,mapUrl,type){
  const theme = CARD_THEME[type] || 'border-l-slate-300';
  const isAb = type==='airbnb';
  const ico = isAb?'🏠':'📍';
  const ttl = isAb?'에어비앤비에서 보기':'구글 지도에서 보기';
  const nameHtml = mapUrl
    ? `<a href="${mapUrl}" target="_blank" rel="noopener" title="${ttl}"
        class="font-bold text-[13.5px] text-slate-800 hover:text-accent2 hover:underline decoration-dotted underline-offset-2">${nm} <span class="text-[10px] align-middle opacity-60">${ico}</span></a>`
    : `<span class="font-bold text-[13.5px]">${nm}</span>`;
  const tagHtml = (tags||[]).filter(Boolean)
    .map(t=>`<span class="inline-block bg-white/70 text-slate-500 text-[10.5px] px-1.5 py-0.5 rounded mr-1">${t}</span>`).join('');
  return `<div class="border border-slate-200 border-l-[4px] ${theme} rounded-lg px-3 py-2 mb-1.5 transition">
    <div class="flex justify-between items-baseline gap-2">
      ${nameHtml}${price?`<span class="text-[11.5px] font-extrabold ${priceColor(price)} whitespace-nowrap">${price}</span>`:''}</div>${
    note?`<div class="text-slate-500 text-[11.8px] mt-0.5 leading-snug">${note}</div>`:''}${
    tagHtml?`<div class="mt-1">${tagHtml}</div>`:''}</div>`;
}
/* '여정 선택' 버튼: 전체 노선이 보이도록 지도 맞춤 + 선택 강조 해제 */
function showFullRoute(){
  map.closePopup();
  document.querySelectorAll('.leaflet-popup.popup-active').forEach(p=>p.classList.remove('popup-active'));
  document.querySelectorAll('.dl-item').forEach(e=>{
    e.classList.remove('bg-red-50');
    e.classList.remove('shadow-[inset_3px_0_0_#c0392b]');
  });
  fitAll();
}
function fmtDay(d){
  const p=d.split('-'); const mm=+p[1]; const dd=+p[2];
  const wd=['일','월','화','수','목','금','토'][new Date(d+'T00:00:00').getDay()];
  return `${mm}/${dd}(${wd})`;
}
function fmtHours(h){const H=Math.floor(h);const M=Math.round((h-H)*60);return M?`${H}시간 ${M}분`:`${H}시간`;}
function toggleDrive(btn){
  const body = btn.parentElement.querySelector('.drive-body');
  const hidden = body.classList.toggle('hidden');
  btn.querySelector('.drive-chev').textContent = hidden ? '▼ 펼치기' : '▲ 접기';
}
function legTo(id){return ROUTE.legs.find(l=>l.to===id)}
function sumKm(){return ROUTE.legs.reduce((a,l)=>a+l.km,0)}

selectStop(ROUTE.stops[0].id);
</script>
