      { "name": "Garden Village Bled", "note": "글램핑·트리하우스 이색 숙소", "price": "€€", "parking": "주차 가능" }

    "restaurants": [

/* ===== 지도 ===== */
const map = L.map('map',{zoomControl:true}).setView([46.8,11.5],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'© OpenStreetMap'
}).addTo(map);

const latlngs = ROUTE.stops.map(s=>[s.lat,s.lng]);
L.polyline(latlngs,{color:'#c0392b',weight:3,opacity:.75}).addTo(map);
map.fitBounds(L.latLngBounds(latlngs).pad(0.12));

const markers = {};
let stayNo = 0;
ROUTE.stops.forEach(s=>{
  const isStay = s.type==='stay';
  if(isStay) stayNo++;
  const label = isStay? String(stayNo) : '';
  const size = isStay?28:14;
  const icon = L.divIcon({ className:'',
    html:`<div class="${isStay?'mk-num':'mk-wp'}"
      style="width:${size}px;height:${size}px;line-height:${size-4}px;font-size:13px">${label}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2] });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup(`<b>${s.name}</b><br><small>${s.country} · ${fmtDay(s.day)}</small>`,{autoPan:false});
  m.on('click',()=>selectStop(s.id));
  markers[s.id]=m;
});

/* 헤더 */
document.getElementById('t-title').textContent = ROUTE.trip.title;
document.getElementById('t-sub').textContent = ROUTE.trip.subtitle;
document.getElementById('t-meta').textContent =
  `🚗 ${ROUTE.trip.car} · 📅 ${ROUTE.trip.start} ~ ${ROUTE.trip.end} · 총 ${sumKm()}km`;

/* 중간 열: 여정 리스트 */
const dl = document.getElementById('daylist');
let nStay=0;
ROUTE.stops.forEach(s=>{
  if(s.type==='stay') nStay++;
  const num = s.type==='stay'? nStay : '';
  const leg = legTo(s.id);
  const isStay = s.type==='stay';
  const el = document.createElement('div');
  el.className='dl-item flex items-center gap-2.5 px-2.5 py-2 rounded-lg cursor-pointer mb-0.5 hover:bg-slate-200/60 transition';
  el.dataset.id=s.id;
  const numCls = isStay
    ? 'w-[25px] h-[25px] text-xs bg-accent'
    : 'w-[19px] h-[19px] text-[0px] bg-slate-400';
  el.innerHTML = `<div class="shrink-0 rounded-full text-white font-bold flex items-center justify-center ${numCls}">${num}</div>
    <div class="min-w-0 text-[13px]"><b class="block text-[13.5px] truncate">${s.name}</b>
    <small class="text-slate-500 text-[11.5px]">${fmtDay(s.day)} · ${s.country}${s.nights?` · ${s.nights}박`:''}${leg?` · ${leg.km}km`:''}</small></div>`;
  el.onclick=()=>selectStop(s.id);
  dl.appendChild(el);
});

document.getElementById('tips').innerHTML =
  `<h3 class="text-amber-700 text-[12.5px] font-bold mb-2">🚘 자가용 여행 팁</h3>
   <ul class="list-disc ml-4">${ROUTE.tips.map(t=>`<li class="text-[11.8px] leading-snug mb-1.5 text-amber-900/80">${t}</li>`).join('')}</ul>`;

/* ===== 선택 동작 ===== */
function selectStop(id){
  const s = ROUTE.stops.find(x=>x.id===id);
  const p = POI[id] || {};
  // 지도는 전체 보기를 그대로 유지하고, 말풍선만 열어 색상으로 강조
  markers[id].openPopup();
  const popEl = markers[id].getPopup().getElement();
  if(popEl){
    document.querySelectorAll('.leaflet-popup.popup-active').forEach(p=>p.classList.remove('popup-active'));
    popEl.classList.add('popup-active');
  }

  document.getElementById('p-chip').textContent =
    (s.type==='start'?'출발':s.type==='end'?'도착':s.type==='waypoint'?'경유·관광':`숙박 ${s.nights}박`) + ' · ' + fmtDay(s.day);
  document.getElementById('p-name').textContent = s.name;
  document.getElementById('p-sub').textContent = s.country;

  let html='';
  if(p.hotels && p.hotels.length){
    html += sec('🏨 추천 숙소', p.hotels.length, p.hotels.map(h=>card(h.name,h.price,h.note,
      [h.parking?`🅿 ${h.parking}`:''])).join(''));
  }
  if(p.restaurants && p.restaurants.length){
    const city = s.name.replace(/\s*\(.*\)/,'').replace(/\s*\(.*$/,'');
    html += sec('🍽 추천 식당', p.restaurants.length, p.restaurants.map(r=>card(r.name,r.price,r.note,
      [r.cuisine?r.cuisine:''], gmaps(r.name, city, s.country))).join(''));
  }
  if(p.highlights && p.highlights.length){
    html += `<div class="mt-5"><h3 class="text-[13px] uppercase tracking-wider text-accent2 font-semibold mb-2.5">📍 가볼 만한 곳</h3>
      <div class="flex flex-wrap gap-1.5">${
      p.highlights.map(h=>`<span class="bg-slate-100 rounded-lg px-2.5 py-1.5 text-[12.5px]">${h}</span>`).join('')}</div></div>`;
  }
  document.getElementById('p-body').innerHTML = html ||
    '<div class="mt-5 text-slate-500 text-[13px]">이 지점은 이동 경유지입니다.</div>';

  document.querySelectorAll('.dl-item').forEach(e=>{
    const on = e.dataset.id===id;
    e.classList.toggle('bg-red-50', on);
    e.classList.toggle('shadow-[inset_3px_0_0_#c0392b]', on);
  });
}
function sec(t,cnt,inner){
  return `<div class="mt-5"><h3 class="text-[13px] uppercase tracking-wider text-accent2 font-semibold mb-2.5 flex items-center gap-2">${t}<span class="text-slate-400 font-normal text-[11.5px]">${cnt}곳</span></h3>${inner}</div>`;
}
function gmaps(name,city,country){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(`${name} ${city} ${country}`);
}
function card(nm,price,note,tags,mapUrl){
  return `<div class="border border-slate-200 rounded-xl px-3.5 py-3 mb-2.5 hover:border-slate-300 hover:shadow-md transition">
    <div class="flex justify-between items-baseline gap-2">
      <span class="font-bold text-[14.5px]">${nm}</span>${
      price?`<span class="text-xs font-bold text-amber-600 whitespace-nowrap">${price}</span>`:''}</div>${
    note?`<div class="text-slate-500 text-[12.8px] mt-1 leading-relaxed">${note}</div>`:''}
    <div class="mt-1.5">${
    (tags||[]).filter(Boolean).map(t=>`<span class="inline-block bg-slate-100 text-slate-600 text-[11px] px-2 py-0.5 rounded mr-1.5">${t}</span>`).join('')}</div>${
    mapUrl?`<a href="${mapUrl}" target="_blank" rel="noopener"
      class="inline-block mt-2 text-xs font-semibold text-accent2 border border-sky-200 bg-sky-50 px-2.5 py-1 rounded-md hover:bg-sky-100 transition">📍 구글 지도에서 보기</a>`:''}</div>`;
}
function fmtDay(d){const dd=d.split('-')[2];const mm=+d.split('-')[1];return `${mm}/${+dd}`}
function legTo(id){return ROUTE.legs.find(l=>l.to===id)}
function sumKm(){return ROUTE.legs.reduce((a,l)=>a+l.km,0)}

selectStop(ROUTE.stops[0].id);
</script>
</body>
</html>
