const latlngs = ROUTE.stops.map(s=>[s.lat,s.lng]);
/* 전체 노선 맞춤: 모바일에서는 상단 제목이 노선을 가리지 않도록 위쪽 여백을 크게 준다 */
function fitAll(){
  const mobile = window.matchMedia('(max-width:767px)').matches;
  map.fitBounds(L.latLngBounds(latlngs), {
    paddingTopLeft: mobile ? [20, 120] : [40, 40],
    paddingBottomRight: [20, 20]
  });
}
fitAll();

/* 실제 도로 경로: OSRM 공개 라우팅으로 구간별 도로 형상을 받아 그린다.
   실패 시 직선(점선)으로 폴백한다. */
function stop(id){return ROUTE.stops.find(s=>s.id===id);}
async function drawRoads(){
  for(const lg of ROUTE.legs){
    const a=stop(lg.from), b=stop(lg.to);
    let drawn=false;
    try{
      const url=`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
      const r=await fetch(url); const j=await r.json();
      if(j.routes && j.routes[0]){
        const coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
        L.polyline(coords,{color:'#c0392b',weight:4,opacity:.85}).addTo(map);
        drawn=true;
      }
    }catch(e){}
    if(!drawn){
      L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{color:'#c0392b',weight:3,opacity:.5,dashArray:'6,7'}).addTo(map);
    }
  }
}
drawRoads();

/* 숙박 번호를 '박 수' 기준으로 계산 — 2박 이상이면 범위(예: 5-6)로 표시 */
const NIGHT_LABEL = {};
(function(){ let cum=0;
  ROUTE.stops.forEach(s=>{
    if(s.type==='stay'){
      const start=cum+1, end=cum+(s.nights||1);
      NIGHT_LABEL[s.id] = (s.nights>1) ? `${start}-${end}` : `${start}`;
      cum=end;
    }
  });
})();

const markers = {};
ROUTE.stops.forEach(s=>{
  const isStay = s.type==='stay';
  const label = isStay? NIGHT_LABEL[s.id] : '';
  const multi = isStay && s.nights>1;
  const w = isStay ? (multi?40:28) : 14;
  const h = isStay?28:14;
  const icon = L.divIcon({ className:'',
    html:`<div class="${isStay?'mk-num':'mk-wp'}"
      style="width:${w}px;height:${h}px;line-height:${h-4}px;font-size:13px">${label}</div>`,
    iconSize:[w,h], iconAnchor:[w/2,h/2] });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
  // autoPan: 말풍선이 상단 제목에 가리지 않도록 지도를 살짝 이동해 제목 아래에 보이게 함
  m.bindPopup(buildPopup(s,null),{autoPan:true,autoPanPaddingTopLeft:[30,118],autoPanPaddingBottomRight:[30,30],minWidth:160});
  m.on('click',()=>selectStop(s.id));
  markers[s.id]=m;
});

/* 말풍선 HTML (사진 + 도시·날짜 + 직전 구간 요약) */
function buildPopup(s, photoUrl){
  const pleg = ROUTE.legs.find(l=>l.to===s.id);
  const legLine = pleg
    ? `<br><small>🚗 ${stop(pleg.from).name.replace(/\s*\(.*\)/,'')}→ 거리 ${pleg.km}km · ${fmtHours(pleg.hours)}</small>`
    : '';
  const img = photoUrl
    ? `<img src="${photoUrl}" alt="" style="width:100%;height:62px;object-fit:cover;border-radius:6px;margin-bottom:5px;display:block">`
    : '';
  return `${img}<b>${s.name}</b><br><small>${s.country} · ${fmtDay(s.day)}</small>${legLine}`;
}

function selectStop(id){
  const s = ROUTE.stops.find(x=>x.id===id);
  const p = POI[id] || {};
  currentStopId = id;
  // 지도는 전체 보기를 그대로 유지하고, 말풍선만 열어 색상으로 강조
  markers[id].openPopup();
  const popEl = markers[id].getPopup().getElement();
  if(popEl){
    document.querySelectorAll('.leaflet-popup.popup-active').forEach(p=>p.classList.remove('popup-active'));
    popEl.classList.add('popup-active');
  }

  document.getElementById('p-chip').textContent =
    (s.type==='start'?'출발':s.type==='end'?'도착':s.type==='waypoint'?'경유·관광':`숙박 ${s.nights}박`) + ' · ' + fmtDay(s.day);
  const city = s.name.replace(/\s*\(.*\)/,'').replace(/\s*\(.*$/,'');
  document.getElementById('p-name').innerHTML =
    `<a href="${wikiUrl(city)}" target="_blank" rel="noopener" title="${city} 소개 보기"
       class="hover:text-accent2 hover:underline decoration-2 underline-offset-2 transition">${s.name} <span class="text-[14px] align-middle text-accent2">↗</span></a>`;
  document.getElementById('p-sub').textContent = s.country;
  loadPhoto(id);

  let html='';

  // 운전 정보 + 자가용 여행 팁 (접이식 카드). 운전 구간이 없는 도시는 팁만 표시
  const leg = legTo(id);
  const tips = CITY_TIPS[id] || [];
  if(leg || tips.length){
    let body='';
    if(leg){
      const from = stop(leg.from);
      const fuelL = leg.km * (ROUTE.fuel.consumption/100);
      const fuelCost = fuelL * ROUTE.fuel.priceEur;
      body += `<div class="grid grid-cols-2 gap-2 text-[13px]">

function addDays(d,n){
  const [y,m,dd]=d.split('-').map(Number);
  const dt=new Date(y,m-1,dd);           // 로컬 자정(시간대 변환 없음)
  dt.setDate(dt.getDate()+n);
  const mm=String(dt.getMonth()+1).padStart(2,'0');
  const da=String(dt.getDate()).padStart(2,'0');
  return `${dt.getFullYear()}-${mm}-${da}`;
}

  return u;
}

function airbnbCards(city,country,curated,ci,co){
  const out=(curated||[]).map(a=>card(a.name,a.price,a.note,['👥 4인',a.area].filter(Boolean),

  const areas=[...new Set([...(curated||[]).map(a=>a.area).filter(Boolean),...AB_AREAS])];

    const t=AB_TYPES[i%AB_TYPES.length], area=areas[i%areas.length], perk=AB_PERKS[i%AB_PERKS.length];
    out.push(card(`${area} ${t[0]}`,t[1],`${perk} · 4인, ${area}`,['👥 4인',area],

const SHOWN = 2; // 기본 노출 개수, 나머지는 '더보기'로 펼침
function expandable(cards, key){
  if(cards.length <= SHOWN) return cards.join('');
  const head = cards.slice(0, SHOWN).join('');
  const rest = cards.slice(SHOWN).join('');
  const n = cards.length - SHOWN;
  return `${head}<div id="more-${key}" class="hidden">${rest}</div>
    <button type="button" onclick="toggleMore('${key}',this)"
      class="w-full mt-1 mb-1 text-[12.5px] font-semibold text-accent2 border border-slate-200 rounded-lg py-2 hover:bg-slate-50 transition">
      더보기 <span class="text-slate-400">+${n}곳</span></button>`;
}
function toggleMore(key, btn){
  const el = document.getElementById('more-'+key);
  const hidden = el.classList.toggle('hidden');
  btn.innerHTML = hidden
    ? `더보기 <span class="text-slate-400">+${el.children.length}곳</span>`
    : '접기 ▲';
}
/* 증분형 더보기 + 언제든 접기: '더보기'는 step개씩 노출, '접기'는 처음 상태로 되돌림(부분 노출 상태에서도 가능) */
function expandableList(items, key, initial, step){
  if(items.length <= initial) return items.join('');
  const head = items.slice(0, initial).join('');
  const rest = items.slice(initial)
    .map(h=>`<span class="more-${key} dc is-hidden">${h}</span>`).join('');
  const remaining = items.length - initial;
  return `${head}${rest}
    <div data-ctrl="${key}" class="flex gap-2 w-full mt-1.5 mb-1">
      <button type="button" data-act="more" data-key="${key}" data-step="${step}" onclick="expMore(this)"
        class="flex-1 text-[12.5px] font-semibold text-accent2 border border-slate-200 rounded-lg py-2 hover:bg-slate-50 transition">
        더보기 <span class="text-slate-400">+${Math.min(step,remaining)}곳</span></button>
      <button type="button" data-act="less" data-key="${key}" onclick="expLess(this)"
        class="hidden shrink-0 px-3.5 text-[12.5px] font-semibold text-stone border border-slate-200 rounded-lg py-2 hover:bg-slate-50 transition">접기 ▲</button>
    </div>`;
}
function expUpdate(key){
  const ctrl=document.querySelector('[data-ctrl="'+key+'"]'); if(!ctrl) return;
  const total=document.querySelectorAll('.more-'+key).length;
  const hidden=document.querySelectorAll('.more-'+key+'.is-hidden').length;
  const more=ctrl.querySelector('[data-act="more"]'), less=ctrl.querySelector('[data-act="less"]');
  if(hidden>0){ more.classList.remove('hidden'); more.querySelector('span').textContent='+'+Math.min(+more.dataset.step,hidden)+'곳'; }
  else more.classList.add('hidden');
  less.classList.toggle('hidden', (total-hidden)<=0);   // 하나라도 펼쳐져 있으면 접기 노출
}
function expMore(btn){ const key=btn.dataset.key, step=+btn.dataset.step;
  Array.from(document.querySelectorAll('.more-'+key+'.is-hidden')).slice(0,step).forEach(el=>el.classList.remove('is-hidden')); expUpdate(key); }
function expLess(btn){ const key=btn.dataset.key;
  document.querySelectorAll('.more-'+key).forEach(el=>el.classList.add('is-hidden')); expUpdate(key); }

const PHOTO_TITLE = {
  budapest:'Budapest', hallstatt:'Hallstatt', salzburg:'Salzburg', feldkirch:'Feldkirch,_Vorarlberg',
  lucerne:'Lucerne', jungfraujoch:'Jungfraujoch', interlaken:'Interlaken', zermatt:'Zermatt',
  milan:'Milan', bled:'Lake_Bled', budapest_end:'Budapest'
};
const photoCache = {};
function fetchPhoto(id){
  const t=PHOTO_TITLE[id];
  if(!t) return Promise.resolve(null);
  if(photoCache[id]!==undefined) return Promise.resolve(photoCache[id]);
  return fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(t))
    .then(r=>r.json())
    .then(j=>{ const src=(j.thumbnail&&j.thumbnail.source)||(j.originalimage&&j.originalimage.source)||null;
      photoCache[id]=src; return src; })
    .catch(()=>{ photoCache[id]=null; return null; });
}

/* config 유효성: URL 과 ANON_KEY 둘 다 채워져 있어야 활성 */
function clCloudEnabled(){

/* 초기화 — 실패/미설정 시 조용히 로컬 폴백 */
function clCloudInit(){

/* 원격에서 받은 items 적용 (로컬 캐시·스토리지 갱신 + 조건부 리렌더) */
function clApplyRemoteItems(val){
  if(!Array.isArray(val) || !val.length) return;
  const next = JSON.stringify(val);
  if(next === JSON.stringify(_clItems)) return; /* 동일 값이면 스킵 */
  _clItems = val;
  try { localStorage.setItem(CL_ITEMS_KEY, next); } catch(e){}
  if(clModalOpen() && !clIsEditingFocused()) renderChecklist();
}
/* 원격에서 받은 checks 적용 */
function clApplyRemoteChecks(val){
  const obj = val || {};
  const next = JSON.stringify(obj);
  let cur = '{}';
  try { cur = localStorage.getItem(CL_CHECKS_KEY) || '{}'; } catch(e){}
  if(next === cur) return;               /* 동일 값이면 스킵 */
  try { localStorage.setItem(CL_CHECKS_KEY, next); } catch(e){}
  if(clModalOpen() && !clIsEditingFocused()) renderChecklist();
}

/* 모달 열릴 때 클라우드 최신본을 1회 불러오기 (자동 실시간 구독은 없음).
   미저장 로컬 변경(dirty)이 있으면 덮어쓰지 않도록 불러오기 스킵 */
function clSubscribe(){
  if(!clCloud.on || !clCloud.sb) return;
  if(clCloud.dirty) return;        /* 미저장 변경 보호: 불러오기 스킵 */

  try {
    clCloud.sb.from('shared_state').select('items,checks').eq('id', CL_SYNC_ID).maybeSingle()
      .then(res=>{
        const data = res && res.data;
        if(!data) return;          /* 원격이 비어 있으면 로컬 유지 */
        if(clCloud.dirty) return;  /* 불러오는 사이 변경이 생겼으면 보호 */
        if(data.items) clApplyRemoteItems(data.items);
        if(data.checks) clApplyRemoteChecks(data.checks);
        clCloud.dirty = false;     /* 불러온 직후는 깨끗한 상태 */
        clSaveBtn();
      }, ()=>{});
  } catch(e){}
}

/* (호환용) 모달 닫을 때 호출 — 자동 구독이 없으므로 채널이 있으면 안전 정리만 */
function clUnsubscribe(){
  if(!clCloud.on || !clCloud.sb) return;
  try {
    if(clCloud.channel){
      clCloud.sb.removeChannel(clCloud.channel);
      clCloud.channel = null;
    }

}

/* 저장 버튼 상태 렌더 (state: 'idle' | 'saving' | 'saved' | 'error') */
function clSaveBtn(state){
  const btn = document.getElementById('cl-save-btn');
  if(!btn) return;
  if(!clCloud.on){ btn.classList.add('hidden'); return; }  /* 비활성이면 숨김 */
  btn.classList.remove('hidden');
  const base = 'shrink-0 inline-flex items-center gap-1 rounded-full px-3 py-1 text-[11px] font-semibold transition whitespace-nowrap ring-1 ';
  if(state === 'saving'){
    btn.disabled = true; btn.innerHTML = '저장 중…';
    btn.className = base + 'bg-white/12 ring-white/20 text-white/70 cursor-wait';
  } else if(state === 'saved'){
    btn.disabled = false; btn.innerHTML = '저장됨 ✓';
    btn.className = base + 'bg-emerald-500/25 ring-emerald-300/40 text-emerald-100';
  } else if(state === 'error'){
    btn.disabled = false; btn.innerHTML = '저장 실패';
    btn.className = base + 'bg-amber-500/25 ring-amber-300/50 text-amber-100';
  } else if(clCloud.dirty){
    btn.disabled = false; btn.innerHTML = '● 저장';
    btn.className = base + 'bg-accent ring-accent/50 text-white hover:bg-red-700';
  } else {
    btn.disabled = false; btn.innerHTML = '저장됨';
    btn.className = base + 'bg-white/8 ring-white/15 text-white/55';
  }
}

  let checks = {};
  try { checks = JSON.parse(localStorage.getItem(CL_CHECKS_KEY)) || {}; } catch(e){}
  const row = { id: CL_SYNC_ID, items: _clItems, checks: checks, updated_at: new Date().toISOString() };
  let p;
  try {
    clCloud.writing = true;
    p = clCloud.sb.from('shared_state').upsert(row);
  } catch(e){ clCloud.writing = false; clSaveBtn('error'); return; }
  Promise.resolve(p).then(res=>{
    clCloud.writing = false;
    if(res && res.error){ clSaveBtn('error'); return; }
    clCloud.dirty = false;
    clSaveBtn('saved');
    if(_clSavedTimer) clearTimeout(_clSavedTimer);
    _clSavedTimer = setTimeout(()=>clSaveBtn(), 1500);
  }, ()=>{ clCloud.writing = false; clSaveBtn('error'); });
}

/* 고유 id 생성 */
function clNewId(){
  if(window.crypto && crypto.randomUUID){ return 'it_' + crypto.randomUUID(); }
  _clIdSeq++;
  return 'it_' + Date.now().toString(36) + '_' + _clIdSeq + '_' + Math.floor(Math.random()*1e6).toString(36);
}
/* 시드 → 안정적 id를 가진 구조로 변환 */
function clSeedToItems(){
  return CHECKLIST_SEED.map(c=>({
    cat: c.cat, icon: c.icon,
    items: c.items.map(t=>({ id: clNewId(), text: t }))
  }));
}
/* 구조 로드 (없으면 시드 복사) */
function clLoadItems(){
  if(_clItems) return _clItems;
  try {
    const raw = localStorage.getItem(CL_ITEMS_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length){ _clItems = parsed; return _clItems; }
    }
  } catch(e){}
  _clItems = clSeedToItems();
  _clSeeding = true;          /* 시드 초기화는 사용자 변경이 아니므로 dirty 처리 안 함 */
  clSaveItems();
  _clSeeding = false;
  return _clItems;
}
let _clSeeding = false;
function clSaveItems(){ try { localStorage.setItem(CL_ITEMS_KEY, JSON.stringify(_clItems)); } catch(e){} if(!_clSeeding) clSetDirty(); }

/* 체크 상태: { "itemId|personId": true } */
function clLoadChecks(){ try { return JSON.parse(localStorage.getItem(CL_CHECKS_KEY)) || {}; } catch(e){ return {}; } }
function clSaveChecks(s){ try { localStorage.setItem(CL_CHECKS_KEY, JSON.stringify(s)); } catch(e){} clSetDirty(); }
function clCheckKey(itemId, personId){ return itemId + '|' + personId; }

/* 전체 항목 수 */
function clTotalItems(){ return clLoadItems().reduce((a,c)=>a+c.items.length, 0); }
/* 특정 사람의 완료 수 */
function clDoneFor(personId, checks){
  let n = 0;
  clLoadItems().forEach(c=>c.items.forEach(it=>{ if(checks[clCheckKey(it.id, personId)]) n++; }));
  return n;
}

function _esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* 사람별 진행률 칩 + 메인 렌더 */
function clUpdatePeople(){
  const checks = clLoadChecks();
  const total = clTotalItems();
  const wrap = document.getElementById('cl-people');
  if(!wrap) return;
  wrap.innerHTML = CL_PEOPLE.map(p=>{
    const done = clDoneFor(p.id, checks);
    const pct = total ? Math.round(done/total*100) : 0;
    return `<div class="bg-white/10 rounded-lg px-2 py-1.5" title="${_esc(p.name)}">
      <div class="flex items-center justify-between gap-1 text-[11px] font-semibold text-white/90">
        <span>${_esc(p.short)}</span>
        <span class="tabular-nums text-white/70 text-[10.5px]">${done}/${total}</span>
      </div>
      <div class="mt-1 h-1.5 rounded-full bg-white/15 overflow-hidden">
        <div class="h-full bg-accent transition-all duration-300" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');
}

  /* 공동(마스터) 체크박스의 indeterminate 표시는 JS로만 설정 가능 */
  list.querySelectorAll('input[data-master]').forEach(m=>{ m.indeterminate = m.dataset.indet === '1'; });

/* 같은 행의 공동(마스터) 체크박스 표시 상태를 4명 기준으로 갱신 (저장 키 없음, 파생) */
function clSyncMaster(itemId){
  const checks = clLoadChecks();
  const done = CL_PEOPLE.filter(p=>checks[clCheckKey(itemId, p.id)]).length;
  const master = document.querySelector('input[data-master="' + itemId + '"]');
  if(!master) return;
  master.checked = done === CL_PEOPLE.length;
  master.indeterminate = done > 0 && done < CL_PEOPLE.length;
}

function toggleChecklistItem(itemId, personId, checked){
  const checks = clLoadChecks();
  const k = clCheckKey(itemId, personId);
  if(checked) checks[k] = true; else delete checks[k];
  clSaveChecks(checks);
  clSyncMaster(itemId);
  clUpdatePeople();
}

/* 공동 체크: 그 항목의 4명 전원을 일괄 체크/해제 (별도 저장 키 없음) */
function clToggleAll(itemId, checked){
  const checks = clLoadChecks();
  CL_PEOPLE.forEach(p=>{
    const k = clCheckKey(itemId, p.id);
    if(checked) checks[k] = true; else delete checks[k];
  });
  clSaveChecks(checks);
  /* 같은 행의 개별 체크박스 표시 동기화 */
  document.querySelectorAll('input[data-item="' + itemId + '"]').forEach(b=>{ b.checked = checked; });
  const master = document.querySelector('input[data-master="' + itemId + '"]');
  if(master) master.indeterminate = false;
  clUpdatePeople();
}

/* ---- 편집(CRUD) ---- */
function clToggleEdit(){
  CL_EDIT = !CL_EDIT;
  const btn = document.getElementById('cl-edit-btn');
  if(btn) btn.innerHTML = CL_EDIT ? '✓ 완료' : '✏️ 편집';
  renderChecklist();
}
function clEditItemText(itemId, val){
  const items = clLoadItems();
  const t = val.trim();
  for(const c of items){
    const it = c.items.find(x=>x.id===itemId);
    if(it){ if(!t){ clDeleteItem(itemId); return; } it.text = t; break; }
  }
  clSaveItems();
}
function clAddItem(catIndex, val){
  const t = (val||'').trim();
  if(!t) return;
  const items = clLoadItems();
  if(!items[catIndex]) return;
  items[catIndex].items.push({ id: clNewId(), text: t });
  clSaveItems();
  renderChecklist();
}
function clDeleteItem(itemId){
  const items = clLoadItems();
  for(const c of items){
    const idx = c.items.findIndex(x=>x.id===itemId);
    if(idx>=0){ c.items.splice(idx,1); break; }
  }
  clSaveItems();
  /* 해당 항목의 체크 상태 정리 */
  const checks = clLoadChecks();
  CL_PEOPLE.forEach(p=>{ delete checks[clCheckKey(itemId, p.id)]; });
  clSaveChecks(checks);
  renderChecklist();
}

/* 모바일: 클릭한 카드 바로 아래에 상세 펼침 + 닫기 버튼 (다시 누르면 닫힘) */
function toggleInlineDetail(cardEl, d){
  const nxt = cardEl.nextElementSibling;
  if(nxt && nxt.classList.contains('inline-detail')){ nxt.remove(); return; }  // 토글로 닫기
  document.querySelectorAll('.inline-detail').forEach(el=>el.remove());        // 다른 패널은 닫기
  const panel=document.createElement('div');
  panel.className='inline-detail w-full basis-full mt-1 mb-2 rounded-xl border border-slate-200 bg-white overflow-hidden shadow-sm';
  panel.innerHTML=`<div class="flex justify-end px-3 py-1.5 bg-slate-50 border-b border-slate-200">
      <button type="button" onclick="this.closest('.inline-detail').remove()"
        class="text-[12px] font-semibold text-stone hover:text-accent px-2 py-0.5">✕ 닫기</button>
    </div>${detailHTML(d)}`;
  cardEl.after(panel);
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}
/* 식당·명소 클릭: 넓은 화면이면 상세 열, 모바일이면 식당 카드 아래 인라인, 그 외(명소 등)는 새 탭 */
document.addEventListener('click',function(ev){

  if(!a) return;
  let d; try{ d=JSON.parse(decodeURIComponent(a.getAttribute('data-detail'))); }catch(e){ return; }

  ev.preventDefault();                                 // 모바일: 식당 카드·명소 pill 모두 인라인 표시
  const ref = a.closest('.rec-card') || a.closest('.dc') || a;   // 식당=카드, 명소=pill(또는 펼침 래퍼) 바로 아래

});

  'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
  'https://overpass.private.coffee/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter'
];
function overpassFetch(query, i){
  i = i || 0;
  if(i >= OVERPASS_EPS.length) return Promise.reject(new Error('all overpass endpoints failed'));
  return fetch(OVERPASS_EPS[i], { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'data='+encodeURIComponent(query) })
    .then(r=>{ if(!r.ok) throw new Error('status '+r.status); return r.json(); })
    .catch(()=>overpassFetch(query, i+1));
}
/* 현지어 장소명을 한국어로 번역 (무료 Google gtx, CORS 허용). 결과 캐시, 실패 시 원문 유지 */
const trCache = {};
function translateKo(names){
  const todo = names.filter(n=>n && trCache[n]===undefined);
  if(!todo.length) return Promise.resolve(trCache);
  const chunks=[]; for(let i=0;i<todo.length;i+=40) chunks.push(todo.slice(i,i+40));
  return Promise.all(chunks.map(chunk=>
    fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q='+encodeURIComponent(chunk.join('\n')))
      .then(r=>r.json())
      .then(j=>{
        const lines=((j[0]||[]).map(s=>s[0]).join('')).split('\n');
        chunk.forEach((orig,idx)=>{ trCache[orig]=((lines[idx]||orig).trim())||orig; });
      })
      .catch(()=>{ chunk.forEach(orig=>{ trCache[orig]=orig; }); })
  )).then(()=>trCache);
}
/* OSM cuisine 값을 한글로 변환(빈출값 사전, 없으면 원문 유지) */

};
function cuisineKo(c){ if(!c) return ''; return CUISINE_KO[String(c).toLowerCase()] || c; }
function priceKo(p){ return p==='€'?'저렴한 편 (€)':p==='€€'?'보통 (€€)':p==='€€€'?'고급 (€€€)':''; }
/* 요리 종류별 대표 메뉴·평균 가격대(1인 기준, 예시). 특정 식당 실제 메뉴판이 아니라 요리 종류 기준 참고치 */

const CUISINE_KO_KEY = {'이탈리아':'italian','피자':'pizza','파스타':'pasta','프랑스':'french','오스트리아':'austrian','독일':'german','스위스':'swiss','헝가리':'hungarian','슬로베니아':'slovenian','지중해':'mediterranean','해산물':'seafood','생선':'fish','인도':'indian','타이':'thai','카페':'cafe','베이커리':'bakery','디저트':'dessert','버거':'burger','스테이크':'steak_house','바비큐':'barbecue','펍':'pub','맥주':'pub','바':'bar','파인다이닝':'fine_dining','채식':'vegetarian','케밥':'kebab','중동':'mediterranean'};
function resolveMenuKey(raw){
  if(!raw) return '';
  const s=String(raw).toLowerCase().split('/')[0].trim();
  if(MENU_INFO[s]) return s;
  for(const k in CUISINE_KO_KEY){ if(String(raw).indexOf(k)>-1) return CUISINE_KO_KEY[k]; }
  return '';
}
function liveRestoCard(n, city, country){
  const ck = cuisineKo(n.cuisine);
  return card(n.name,'','',[ck||'식당','주변'].filter(Boolean), gmaps(n.name,city,country), 'food', undefined,
    { name:n.name, food:true, cuisineRaw:n.cuisine||'', sub:'주변 검색 결과', note:'', query:`${n.name} ${city} ${country}`, mapurl:gmaps(n.name,city,country), kind:'추천 식당 · 주변',
      chips:[ck].filter(Boolean), address:n.address||'', hours:n.hours||'', phone:n.phone||'', website:n.website||'' });
}
function loadLive(kind, id, city, country){
  const s = stop(id);
  const ckey = id+'-'+kind;
  const loaderId = (kind==='restaurant'?'load-r-':'load-hl-')+id;
  function apply(items){
    if(currentStopId!==id) return;                 // 도시가 바뀌었으면 무시
    const loader=document.getElementById(loaderId); if(loader) loader.remove();
    if(!items || !items.length) return;
    if(kind==='restaurant'){
      const seen=new Set((POI[id]&&POI[id].restaurants||[]).map(r=>r.name.toLowerCase()));
      const fresh=items.filter(n=>!seen.has(n.name.toLowerCase()));
      const curated=(POI[id]&&POI[id].restaurants||[]).map(r=>card(r.name,r.price,r.note,[r.cuisine||''], gmaps(r.name,city,country),'food',undefined,
        { name:r.name, food:true, price:r.price||'', cuisineRaw:r.cuisine||'', chips:[r.cuisine,r.price].filter(Boolean), note:r.note||'', query:`${r.name} ${city} ${country}`, mapurl:gmaps(r.name,city,country), kind:'추천 식당' }));
      const merged=curated.concat(fresh.map(n=>liveRestoCard(n,city,country)));
      const list=document.getElementById('list-r-'+id); if(list) list.innerHTML=expandableList(merged, id+'-r', 2, 4);
      const cnt=document.getElementById('cnt-r-'+id); if(cnt) cnt.textContent=merged.length;
    }else{
      const seen=new Set((POI[id]&&POI[id].highlights||[]).map(x=>x.toLowerCase()));
      const fresh=items.filter(n=>!seen.has(n.name.toLowerCase()));
      const curated=(POI[id]&&POI[id].highlights||[]).map(h=>pillHL(h,city,country));
      function renderHL(tmap){
        const livePills=fresh.map(n=>pillHL((tmap&&tmap[n.name])||n.name, city, country, n, n.name));  // 표시는 한국어, 검색은 원문
        const merged=curated.concat(livePills);
        const list=document.getElementById('list-hl-'+id); if(list) list.innerHTML=expandableList(merged, id+'-hl', 10, 10);
        const cnt=document.getElementById('cnt-hl-'+id); if(cnt) cnt.textContent=merged.length;
      }
      renderHL(null);                                                                          // 우선 원문으로 즉시 표시
      if(fresh.length) translateKo(fresh.map(n=>n.name)).then(tmap=>{ if(currentStopId===id) renderHL(tmap); });  // 번역되면 한국어로 교체
    }
  }
  if(liveCache[ckey]){ apply(liveCache[ckey]); return; }
  overpassFetch(OSM_Q[kind](s))
    .then(j=>{
      const seen=new Set(), out=[];
      (j.elements||[]).forEach(e=>{
        const t=e.tags||{}; const nm=t['name:ko']||t.name||t['name:en'];
        if(!nm) return; const k=nm.toLowerCase(); if(seen.has(k)) return; seen.add(k);
        const street=[t['addr:street'], t['addr:housenumber']].filter(Boolean).join(' ');
        const address=[street, t['addr:city']].filter(Boolean).join(', ');
        out.push({ name:nm, cuisine:(t.cuisine||'').split(';')[0].replace(/_/g,' '),
          address:address, hours:t.opening_hours||'', phone:t.phone||t['contact:phone']||'',
          website:t.website||t['contact:website']||'' });
      });
      liveCache[ckey]=out; apply(out);
    })
    .catch(()=>{ if(currentStopId===id){ const l=document.getElementById(loaderId); if(l){ l.innerHTML='주변 실시간 검색을 불러오지 못했어요. <button onclick="retryLive(\''+kind+'\',\''+id+'\')" class="underline text-accent2">다시 시도</button>'; } } });
}
function retryLive(kind,id){ delete liveCache[id+'-'+kind]; const s=stop(id); const city=s.name.replace(/\s*\(.*\)/,'').replace(/\s*\(.*$/,''); const l=document.getElementById((kind==='restaurant'?'load-r-':'load-hl-')+id); if(l) l.textContent='다시 검색 중…'; loadLive(kind,id,city,s.country); }

selectStop(ROUTE.stops[0].id);

/* 각 도시 말풍선에 대표 사진을 채워 넣는다(로드되는 대로 갱신) */
ROUTE.stops.forEach(s=>{
  fetchPhoto(s.id).then(url=>{ if(url && markers[s.id]) markers[s.id].setPopupContent(buildPopup(s,url)); });
});
